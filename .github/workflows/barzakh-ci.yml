name: Barzakh CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

env:
  EDK2_VERSION: edk2-stable202405

jobs:
  build-bootkit:
    name: Build UEFI Bootkit
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    
    steps:
      - name: Checkout Barzakh
        uses: actions/checkout@v4
        with:
          path: barzakh
      
      - name: Cache EDK II
        uses: actions/cache@v4
        id: cache-edk2
        with:
          path: edk2
          key: edk2-full-${{ env.EDK2_VERSION }}-${{ hashFiles('barzakh/src/**/*.c', 'barzakh/src/**/*.h') }}
          restore-keys: |
            edk2-full-${{ env.EDK2_VERSION }}-
      
      - name: Setup EDK II
        if: steps.cache-edk2.outputs.cache-hit != 'true'
        env:
          GIT_TERMINAL_PROMPT: 0
        run: |
          rm -rf edk2
          git clone --depth 1 --branch ${{ env.EDK2_VERSION }} \
            https://github.com/tianocore/edk2.git
          cd edk2
          # Initialize only required submodules (SubhookLib/GoogleTest are unavailable/unneeded)
          git submodule init \
            BaseTools/Source/C/BrotliCompress/brotli \
            MdeModulePkg/Library/BrotliCustomDecompressLib/brotli \
            CryptoPkg/Library/OpensslLib/openssl \
            CryptoPkg/Library/MbedTlsLib/mbedtls \
            ArmPkg/Library/ArmSoftFloatLib/berkeley-softfloat-3 \
            MdePkg/Library/BaseFdtLib/libfdt \
            MdePkg/Library/MipiSysTLib/mipisyst \
            RedfishPkg/Library/JsonLib/jansson \
            SecurityPkg/DeviceSecurity/SpdmLib/libspdm \
            MdeModulePkg/Universal/RegularExpressionDxe/oniguruma \
            UnitTestFrameworkPkg/Library/CmockaLib/cmocka
          for i in {1..3}; do
            git submodule update --recursive && break || {
              echo "Submodule update attempt $i failed, retrying..."
              sleep 10
            }
          done
      
      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential uuid-dev iasl nasm python3-setuptools
      
      - name: Build EDK II BaseTools
        run: |
          cd edk2
          make -C BaseTools
          source edksetup.sh
      
      - name: Copy Barzakh Packages
        run: |
          cp -r barzakh/src/BootkitPkg edk2/
          cp -r barzakh/src/AttestationPkg edk2/
      
      - name: Build Bootkit Package
        run: |
          cd edk2
          rm -f Conf/BuildEnv.sh
          source edksetup.sh
          build -a X64 -t GCC5 -p BootkitPkg/BootkitPkg.dsc
      
      - name: Upload Bootkit Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bootkit-binaries
          path: edk2/Build/BootkitPkg/DEBUG_GCC5/X64/*.efi

  build-bootkit-aarch64:
    name: Build AARCH64 Bootkit
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout Barzakh
        uses: actions/checkout@v4
        with:
          path: barzakh

      - name: Cache EDK II
        uses: actions/cache@v4
        id: cache-edk2-aarch64
        with:
          path: edk2
          key: edk2-aarch64-${{ env.EDK2_VERSION }}-${{ hashFiles('barzakh/src/**/*.c', 'barzakh/src/**/*.h') }}
          restore-keys: |
            edk2-aarch64-${{ env.EDK2_VERSION }}-
            edk2-full-${{ env.EDK2_VERSION }}-

      - name: Setup EDK II
        if: steps.cache-edk2-aarch64.outputs.cache-hit != 'true'
        env:
          GIT_TERMINAL_PROMPT: 0
        run: |
          rm -rf edk2
          git clone --depth 1 --branch ${{ env.EDK2_VERSION }} \
            https://github.com/tianocore/edk2.git
          cd edk2
          git submodule init \
            BaseTools/Source/C/BrotliCompress/brotli \
            MdeModulePkg/Library/BrotliCustomDecompressLib/brotli \
            CryptoPkg/Library/OpensslLib/openssl \
            CryptoPkg/Library/MbedTlsLib/mbedtls \
            ArmPkg/Library/ArmSoftFloatLib/berkeley-softfloat-3 \
            MdePkg/Library/BaseFdtLib/libfdt \
            MdePkg/Library/MipiSysTLib/mipisyst \
            RedfishPkg/Library/JsonLib/jansson \
            SecurityPkg/DeviceSecurity/SpdmLib/libspdm \
            MdeModulePkg/Universal/RegularExpressionDxe/oniguruma \
            UnitTestFrameworkPkg/Library/CmockaLib/cmocka
          for i in {1..3}; do
            git submodule update --recursive && break || {
              echo "Submodule update attempt $i failed, retrying..."
              sleep 10
            }
          done

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential uuid-dev iasl nasm python3-setuptools \
            gcc-aarch64-linux-gnu

      - name: Build EDK II BaseTools
        run: |
          cd edk2
          make -C BaseTools
          source edksetup.sh

      - name: Copy Barzakh Packages
        run: |
          cp -r barzakh/src/BootkitPkg edk2/
          cp -r barzakh/src/AttestationPkg edk2/

      - name: Build AARCH64 Bootkit Package
        run: |
          cd edk2
          rm -f Conf/BuildEnv.sh
          source edksetup.sh
          export GCC5_AARCH64_PREFIX=aarch64-linux-gnu-
          build -a AARCH64 -t GCC5 -p BootkitPkg/BootkitPkgAarch64.dsc

      - name: Upload AARCH64 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bootkit-aarch64-binaries
          path: edk2/Build/BootkitPkgAarch64/DEBUG_GCC5/AARCH64/*.efi

  build-legacy-bootkit:
    name: Build Legacy BIOS Bootkit
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install NASM
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm

      - name: Build Legacy MBR/VBR
        run: |
          cd src/LegacyBootkit
          make

      - name: Verify Output Size
        run: |
          # MBR and VBR must be exactly 512 bytes
          MBR_SIZE=$(wc -c < build/legacy/mbr_infector.bin)
          VBR_SIZE=$(wc -c < build/legacy/vbr_hook.bin)
          echo "MBR size: $MBR_SIZE bytes"
          echo "VBR size: $VBR_SIZE bytes"
          [ "$MBR_SIZE" -eq 512 ] || { echo "ERROR: MBR is not 512 bytes"; exit 1; }
          [ "$VBR_SIZE" -eq 512 ] || { echo "ERROR: VBR is not 512 bytes"; exit 1; }

      - name: Upload Legacy Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: legacy-bootkit-binaries
          path: build/legacy/*.bin

  build-scanner-rs:
    name: Build Rust Scanner
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/barzakh-scanner-rs

      - name: Build Release Binary
        working-directory: src/barzakh-scanner-rs
        run: cargo build --release

      - name: Upload Scanner Binary
        uses: actions/upload-artifact@v4
        with:
          name: barzakh-scanner-rs
          path: src/barzakh-scanner-rs/target/release/barzakh-scanner

  test-scanner-rs:
    name: Test Rust Scanner
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/barzakh-scanner-rs

      - name: Check Formatting
        working-directory: src/barzakh-scanner-rs
        run: cargo fmt --check

      - name: Run Clippy
        working-directory: src/barzakh-scanner-rs
        run: cargo clippy -- -D warnings

      - name: Run Tests
        working-directory: src/barzakh-scanner-rs
        run: cargo test

  test-killswitch-c:
    name: Test Kill-Switch Logic (C)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build and run kill-switch unit tests
        run: |
          cd tests/killswitch
          make

  adversary-test:
    name: Adversary Red-Team Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: [build-scanner-rs]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/barzakh-scanner-rs

      - name: Run Adversary Unit Tests
        working-directory: src/barzakh-scanner-rs
        run: cargo test -p barzakh-adversary

      - name: Run Corpus Validation (E2E)
        working-directory: src/barzakh-scanner-rs
        run: cargo test -p barzakh-adversary -- --ignored corpus_validation

  security-audit-rs:
    name: Security Audit (Rust)
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: |
          curl -LSfs https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          cargo binstall cargo-audit --no-confirm

      - name: Run Audit
        working-directory: src/barzakh-scanner-rs
        run: cargo audit

  qemu-e2e:
    name: QEMU End-to-End Test
    runs-on: ubuntu-24.04
    needs: [build-bootkit, build-scanner-rs]
    timeout-minutes: 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Bootkit Artifacts
        uses: actions/download-artifact@v4
        with:
          name: bootkit-binaries
          path: ./binaries

      - name: Download Scanner Binary
        uses: actions/download-artifact@v4
        with:
          name: barzakh-scanner-rs
          path: ./binaries

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 tpm2-tools

      - name: Run E2E Test
        run: |
          chmod +x scripts/qemu-e2e.sh
          ./scripts/qemu-e2e.sh ./binaries

      - name: Upload E2E Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-e2e-results
          path: |
            build/e2e/dumps/memory-dump.bin
            build/e2e/dumps/pcrs.json
            build/e2e/dumps/scan_results.json

  documentation:
    name: Build Documentation
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Documentation
        run: |
          mkdir -p docs/_build/html
          cp docs/*.md docs/_build/html/ 2>/dev/null || true
          cp README.md docs/_build/html/ 2>/dev/null || true

      - name: Upload Documentation
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: docs/_build/html

  release:
    name: Create Release
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: [build-bootkit, build-scanner-rs, test-scanner-rs, qemu-e2e, documentation]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create Release Package
        run: |
          mkdir -p release
          cp -r artifacts/bootkit-binaries release/ 2>/dev/null || true
          cp -r artifacts/barzakh-scanner-rs release/ 2>/dev/null || true
          cp -r artifacts/qemu-e2e-results release/ 2>/dev/null || true
          cp -r artifacts/documentation release/ 2>/dev/null || true
          tar -czf barzakh-release.tar.gz release/
      
      - name: Generate Release Notes
        run: |
          echo "# Barzakh Release" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "## Build Information" >> RELEASE_NOTES.md
          echo "- Commit: ${{ github.sha }}" >> RELEASE_NOTES.md
          echo "- Date: $(date -u)" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "## Artifacts" >> RELEASE_NOTES.md
          echo "- Bootkit binaries" >> RELEASE_NOTES.md
          echo "- Scanner results" >> RELEASE_NOTES.md
          echo "- Documentation" >> RELEASE_NOTES.md
      
      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-package
          path: barzakh-release.tar.gz
