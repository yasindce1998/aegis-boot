name: Aegis-Boot CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

env:
  EDK2_VERSION: edk2-stable202405
  PYTHON_VERSION: '3.12'

jobs:
  build-bootkit:
    name: Build UEFI Bootkit
    runs-on: ubuntu-24.04
    
    steps:
      - name: Checkout Aegis-Boot
        uses: actions/checkout@v4
        with:
          path: aegis-boot
      
      - name: Cache EDK II
        uses: actions/cache@v4
        id: cache-edk2
        with:
          path: edk2
          key: edk2-full-${{ env.EDK2_VERSION }}-${{ hashFiles('aegis-boot/src/**/*.c', 'aegis-boot/src/**/*.h') }}
          restore-keys: |
            edk2-full-${{ env.EDK2_VERSION }}-
      
      - name: Setup EDK II
        if: steps.cache-edk2.outputs.cache-hit != 'true'
        env:
          GIT_TERMINAL_PROMPT: 0
        run: |
          rm -rf edk2
          git clone --depth 1 --branch ${{ env.EDK2_VERSION }} \
            https://github.com/tianocore/edk2.git
          cd edk2
          # Initialize only required submodules (SubhookLib/GoogleTest are unavailable/unneeded)
          git submodule init \
            BaseTools/Source/C/BrotliCompress/brotli \
            MdeModulePkg/Library/BrotliCustomDecompressLib/brotli \
            CryptoPkg/Library/OpensslLib/openssl \
            CryptoPkg/Library/MbedTlsLib/mbedtls \
            ArmPkg/Library/ArmSoftFloatLib/berkeley-softfloat-3 \
            MdePkg/Library/BaseFdtLib/libfdt \
            MdePkg/Library/MipiSysTLib/mipisyst \
            RedfishPkg/Library/JsonLib/jansson \
            SecurityPkg/DeviceSecurity/SpdmLib/libspdm \
            MdeModulePkg/Universal/RegularExpressionDxe/oniguruma \
            UnitTestFrameworkPkg/Library/CmockaLib/cmocka
          for i in {1..3}; do
            git submodule update --recursive && break || {
              echo "Submodule update attempt $i failed, retrying..."
              sleep 10
            }
          done
      
      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential uuid-dev iasl nasm python3-setuptools
      
      - name: Build EDK II BaseTools
        run: |
          cd edk2
          make -C BaseTools
          source edksetup.sh
      
      - name: Copy Aegis-Boot Packages
        run: |
          cp -r aegis-boot/src/BootkitPkg edk2/
          cp -r aegis-boot/src/AttestationPkg edk2/
      
      - name: Build Bootkit Package
        run: |
          cd edk2
          rm -f Conf/BuildEnv.sh
          source edksetup.sh
          build -a X64 -t GCC5 -p BootkitPkg/BootkitPkg.dsc
      
      - name: Upload Bootkit Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bootkit-binaries
          path: edk2/Build/BootkitPkg/DEBUG_GCC5/X64/*.efi

  build-bootkit-aarch64:
    name: Build AARCH64 Bootkit
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Aegis-Boot
        uses: actions/checkout@v4
        with:
          path: aegis-boot

      - name: Cache EDK II
        uses: actions/cache@v4
        id: cache-edk2-aarch64
        with:
          path: edk2
          key: edk2-aarch64-${{ env.EDK2_VERSION }}-${{ hashFiles('aegis-boot/src/**/*.c', 'aegis-boot/src/**/*.h') }}
          restore-keys: |
            edk2-aarch64-${{ env.EDK2_VERSION }}-
            edk2-full-${{ env.EDK2_VERSION }}-

      - name: Setup EDK II
        if: steps.cache-edk2-aarch64.outputs.cache-hit != 'true'
        env:
          GIT_TERMINAL_PROMPT: 0
        run: |
          rm -rf edk2
          git clone --depth 1 --branch ${{ env.EDK2_VERSION }} \
            https://github.com/tianocore/edk2.git
          cd edk2
          git submodule init \
            BaseTools/Source/C/BrotliCompress/brotli \
            MdeModulePkg/Library/BrotliCustomDecompressLib/brotli \
            CryptoPkg/Library/OpensslLib/openssl \
            CryptoPkg/Library/MbedTlsLib/mbedtls \
            ArmPkg/Library/ArmSoftFloatLib/berkeley-softfloat-3 \
            MdePkg/Library/BaseFdtLib/libfdt \
            MdePkg/Library/MipiSysTLib/mipisyst \
            RedfishPkg/Library/JsonLib/jansson \
            SecurityPkg/DeviceSecurity/SpdmLib/libspdm \
            MdeModulePkg/Universal/RegularExpressionDxe/oniguruma \
            UnitTestFrameworkPkg/Library/CmockaLib/cmocka
          for i in {1..3}; do
            git submodule update --recursive && break || {
              echo "Submodule update attempt $i failed, retrying..."
              sleep 10
            }
          done

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential uuid-dev iasl nasm python3-setuptools \
            gcc-aarch64-linux-gnu

      - name: Build EDK II BaseTools
        run: |
          cd edk2
          make -C BaseTools
          source edksetup.sh

      - name: Copy Aegis-Boot Packages
        run: |
          cp -r aegis-boot/src/BootkitPkg edk2/
          cp -r aegis-boot/src/AttestationPkg edk2/

      - name: Build AARCH64 Bootkit Package
        run: |
          cd edk2
          rm -f Conf/BuildEnv.sh
          source edksetup.sh
          export GCC5_AARCH64_PREFIX=aarch64-linux-gnu-
          build -a AARCH64 -t GCC5 -p BootkitPkg/BootkitPkgAarch64.dsc

      - name: Upload AARCH64 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bootkit-aarch64-binaries
          path: edk2/Build/BootkitPkgAarch64/DEBUG_GCC5/AARCH64/*.efi

  build-legacy-bootkit:
    name: Build Legacy BIOS Bootkit
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install NASM
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm

      - name: Build Legacy MBR/VBR
        run: |
          cd src/LegacyBootkit
          make

      - name: Verify Output Size
        run: |
          # MBR and VBR must be exactly 512 bytes
          MBR_SIZE=$(wc -c < build/legacy/mbr_infector.bin)
          VBR_SIZE=$(wc -c < build/legacy/vbr_hook.bin)
          echo "MBR size: $MBR_SIZE bytes"
          echo "VBR size: $VBR_SIZE bytes"
          [ "$MBR_SIZE" -eq 512 ] || { echo "ERROR: MBR is not 512 bytes"; exit 1; }
          [ "$VBR_SIZE" -eq 512 ] || { echo "ERROR: VBR is not 512 bytes"; exit 1; }

      - name: Upload Legacy Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: legacy-bootkit-binaries
          path: build/legacy/*.bin

  test-scanner:
    name: Test Detection Scanner
    runs-on: ubuntu-24.04
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install Dependencies
        run: |
          pip install -r tests/requirements.txt
          pip install pytest pytest-cov
      
      - name: Run Unit Tests
        run: |
          pytest tests/unit/ -v --cov=src/AegisScanner --cov-report=xml
      
      - name: Run Integration Tests
        run: |
          pytest tests/integration/ -v
      
      - name: Upload Coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: scanner
          name: scanner-coverage
          token: ${{ secrets.CODECOV_TOKEN }}

  qemu-e2e:
    name: QEMU End-to-End Test
    runs-on: ubuntu-24.04
    needs: build-bootkit

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 ovmf mtools swtpm socat tpm2-tools
          pip install -r tests/requirements.txt

      - name: Download Bootkit Artifacts
        uses: actions/download-artifact@v4
        with:
          name: bootkit-binaries
          path: ./binaries

      - name: Run QEMU E2E Test
        run: |
          chmod +x scripts/qemu-e2e.sh
          ./scripts/qemu-e2e.sh ./binaries

      - name: Upload E2E Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-e2e-results
          path: |
            build/e2e/dumps/memory-dump.bin
            build/e2e/dumps/pcrs.json
            build/e2e/dumps/serial.log
            build/e2e/dumps/scan_results.json

  adversarial-test:
    name: Adversarial Generator Test
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r tests/requirements.txt
          pip install pytest

      - name: Run Adversarial Generator Tests
        run: |
          pytest tests/unit/test_adversarial_generator.py -v

      - name: Generate and Evaluate Corpus
        run: |
          python -c "
          import sys, json
          sys.path.insert(0, '.')
          from src.AegisScanner.generator import AdversarialGenerator, DetectionEvaluator
          from src.AegisScanner.generator.generator import GenerationConfig
          from src.AegisScanner.generator.templates import Architecture
          from pathlib import Path

          gen = AdversarialGenerator(seed=42)
          config = GenerationConfig(count=50, difficulty=4, output_dir=Path('generated_corpus'))
          paths = gen.generate(config)
          print(f'Generated {len(paths)} samples')

          evaluator = DetectionEvaluator()
          report = evaluator.evaluate(gen.get_results())
          print(f'Detection rate: {report.detection_rate:.2%}')
          print(f'Detected: {report.total_detected}/{report.total_samples}')

          report.save(Path('adversarial_report.json'))

          # Assert minimum detection rate
          assert report.detection_rate >= 0.70, f'Detection rate {report.detection_rate:.2%} below 70% threshold'
          print('PASS: Detection rate meets threshold')
          "

      - name: Upload Adversarial Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: adversarial-report
          path: adversarial_report.json

  security-audit:
    name: Security Audit
    runs-on: ubuntu-24.04
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Run Bandit (Python Security)
        run: |
          pip install bandit
          bandit -r src/AegisScanner/ -f json -o bandit-report.json || true
      
      - name: Run Safety (Dependency Check)
        run: |
          pip install safety
          safety check --json > safety-report.json || true
      
      - name: Upload Security Reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json

  documentation:
    name: Build Documentation
    runs-on: ubuntu-24.04
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install Sphinx
        run: |
          pip install sphinx sphinx-rtd-theme
      
      - name: Build Documentation
        run: |
          cd docs
          sphinx-build -b html . _build/html 2>/dev/null || mkdir -p _build/html
          cp *.md _build/html/ 2>/dev/null || true
      
      - name: Upload Documentation
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: docs/_build/html

  release:
    name: Create Release
    runs-on: ubuntu-24.04
    needs: [build-bootkit, test-scanner, qemu-e2e, documentation]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create Release Package
        run: |
          mkdir -p release
          cp -r artifacts/bootkit-binaries release/ 2>/dev/null || true
          cp -r artifacts/qemu-e2e-results release/ 2>/dev/null || true
          cp -r artifacts/documentation release/ 2>/dev/null || true
          tar -czf aegis-boot-release.tar.gz release/
      
      - name: Generate Release Notes
        run: |
          echo "# Aegis-Boot Release" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "## Build Information" >> RELEASE_NOTES.md
          echo "- Commit: ${{ github.sha }}" >> RELEASE_NOTES.md
          echo "- Date: $(date -u)" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "## Artifacts" >> RELEASE_NOTES.md
          echo "- Bootkit binaries" >> RELEASE_NOTES.md
          echo "- Scanner results" >> RELEASE_NOTES.md
          echo "- Documentation" >> RELEASE_NOTES.md
      
      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-package
          path: aegis-boot-release.tar.gz


