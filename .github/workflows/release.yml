name: Release Binaries

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            ext: ""
            cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04
            ext: ""
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            ext: ""
            cross: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            ext: ""
            cross: false
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            ext: ".exe"
            cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux ARM64)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/barzakh-scanner-rs

      - name: Build (native)
        if: ${{ !matrix.cross }}
        working-directory: src/barzakh-scanner-rs
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        working-directory: src/barzakh-scanner-rs
        run: cross build --release --target ${{ matrix.target }}

      - name: Determine platform suffix
        id: suffix
        shell: bash
        run: |
          case "${{ matrix.target }}" in
            x86_64-unknown-linux-gnu)   echo "platform=linux-x86_64" >> "$GITHUB_OUTPUT" ;;
            aarch64-unknown-linux-gnu)  echo "platform=linux-aarch64" >> "$GITHUB_OUTPUT" ;;
            x86_64-apple-darwin)        echo "platform=macos-x86_64" >> "$GITHUB_OUTPUT" ;;
            aarch64-apple-darwin)       echo "platform=macos-aarch64" >> "$GITHUB_OUTPUT" ;;
            x86_64-pc-windows-msvc)     echo "platform=windows-x86_64" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Rename binaries (Unix)
        if: runner.os != 'Windows'
        run: |
          cp src/barzakh-scanner-rs/target/${{ matrix.target }}/release/barzakh-scanner \
             barzakh-scanner-${{ steps.suffix.outputs.platform }}
          cp src/barzakh-scanner-rs/target/${{ matrix.target }}/release/barzakh-adversary \
             barzakh-adversary-${{ steps.suffix.outputs.platform }}

      - name: Rename binaries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "src\barzakh-scanner-rs\target\${{ matrix.target }}\release\barzakh-scanner.exe" `
                    "barzakh-scanner-${{ steps.suffix.outputs.platform }}.exe"
          Copy-Item "src\barzakh-scanner-rs\target\${{ matrix.target }}\release\barzakh-adversary.exe" `
                    "barzakh-adversary-${{ steps.suffix.outputs.platform }}.exe"

      - name: Upload scanner artifact
        uses: actions/upload-artifact@v4
        with:
          name: barzakh-scanner-${{ steps.suffix.outputs.platform }}${{ matrix.ext }}
          path: barzakh-scanner-${{ steps.suffix.outputs.platform }}${{ matrix.ext }}

      - name: Upload adversary artifact
        uses: actions/upload-artifact@v4
        with:
          name: barzakh-adversary-${{ steps.suffix.outputs.platform }}${{ matrix.ext }}
          path: barzakh-adversary-${{ steps.suffix.outputs.platform }}${{ matrix.ext }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          cd release
          sha256sum * > sha256sums.txt
          cat sha256sums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
