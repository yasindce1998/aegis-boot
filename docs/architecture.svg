<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-magenta" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#e6edf3" stroke-width="1.2"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#00d4ff" stroke-width="1.2"/>
    </marker>
    <marker id="arrow-magenta" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#ff00aa" stroke-width="1.2"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#00ff88" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" rx="12" fill="#0d1117"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="bold">BARZAKH — Firmware Security Research Platform</text>

  <!-- ═══════════ OFFENSE GROUP (left) ═══════════ -->
  <rect x="30" y="50" width="260" height="310" rx="10" fill="rgba(0,212,255,0.06)" stroke="#00d4ff" stroke-width="1.5" filter="url(#glow-cyan)"/>
  <text x="160" y="74" text-anchor="middle" fill="#00d4ff" font-size="13" font-weight="bold">⚔️  OFFENSE — 31 Modules</text>

  <!-- Offense items -->
  <rect x="50" y="90" width="220" height="34" rx="6" fill="rgba(0,212,255,0.1)" stroke="#00d4ff" stroke-width="0.8"/>
  <text x="160" y="112" text-anchor="middle" fill="#e6edf3" font-size="11">Ring 0 — DXE / Boot Hooks</text>

  <rect x="50" y="132" width="220" height="34" rx="6" fill="rgba(0,212,255,0.1)" stroke="#00d4ff" stroke-width="0.8"/>
  <text x="160" y="154" text-anchor="middle" fill="#e6edf3" font-size="11">Ring −1 — SMM Persistence</text>

  <rect x="50" y="174" width="220" height="34" rx="6" fill="rgba(0,212,255,0.1)" stroke="#00d4ff" stroke-width="0.8"/>
  <text x="160" y="196" text-anchor="middle" fill="#e6edf3" font-size="11">Ring −2 — ME / PSP Attacks</text>

  <rect x="50" y="216" width="220" height="34" rx="6" fill="rgba(0,212,255,0.1)" stroke="#00d4ff" stroke-width="0.8"/>
  <text x="160" y="238" text-anchor="middle" fill="#e6edf3" font-size="11">Ring −3 — DMA / Flash / fTPM</text>

  <rect x="50" y="258" width="220" height="34" rx="6" fill="rgba(0,212,255,0.1)" stroke="#00d4ff" stroke-width="0.8"/>
  <text x="160" y="280" text-anchor="middle" fill="#e6edf3" font-size="11">AArch64 — EL3 / TrustZone</text>

  <rect x="50" y="300" width="220" height="34" rx="6" fill="rgba(0,212,255,0.1)" stroke="#00d4ff" stroke-width="0.8"/>
  <text x="160" y="322" text-anchor="middle" fill="#e6edf3" font-size="11">RISC-V — M-Mode Hooks</text>

  <!-- ═══════════ DEFENSE GROUP (right) ═══════════ -->
  <rect x="610" y="50" width="260" height="310" rx="10" fill="rgba(0,255,136,0.06)" stroke="#00ff88" stroke-width="1.5" filter="url(#glow-green)"/>
  <text x="740" y="74" text-anchor="middle" fill="#00ff88" font-size="13" font-weight="bold">🛡️  DEFENSE — 30 Detectors</text>

  <!-- Defense items -->
  <rect x="630" y="90" width="220" height="34" rx="6" fill="rgba(0,255,136,0.1)" stroke="#00ff88" stroke-width="0.8"/>
  <text x="740" y="112" text-anchor="middle" fill="#e6edf3" font-size="11">PCR / TPM Attestation</text>

  <rect x="630" y="132" width="220" height="34" rx="6" fill="rgba(0,255,136,0.1)" stroke="#00ff88" stroke-width="0.8"/>
  <text x="740" y="154" text-anchor="middle" fill="#e6edf3" font-size="11">Memory &amp; Hook Analysis</text>

  <rect x="630" y="174" width="220" height="34" rx="6" fill="rgba(0,255,136,0.1)" stroke="#00ff88" stroke-width="0.8"/>
  <text x="740" y="196" text-anchor="middle" fill="#e6edf3" font-size="11">Firmware Structure Validation</text>

  <rect x="630" y="216" width="220" height="34" rx="6" fill="rgba(0,255,136,0.1)" stroke="#00ff88" stroke-width="0.8"/>
  <text x="740" y="238" text-anchor="middle" fill="#e6edf3" font-size="11">Secure Boot Chain</text>

  <rect x="630" y="258" width="220" height="34" rx="6" fill="rgba(0,255,136,0.1)" stroke="#00ff88" stroke-width="0.8"/>
  <text x="740" y="280" text-anchor="middle" fill="#e6edf3" font-size="11">Behavioral Heuristics</text>

  <rect x="630" y="300" width="220" height="34" rx="6" fill="rgba(0,255,136,0.1)" stroke="#00ff88" stroke-width="0.8"/>
  <text x="740" y="322" text-anchor="middle" fill="#e6edf3" font-size="11">Ring −3 Subsystem Monitor</text>

  <!-- ═══════════ ADVERSARY GROUP (bottom center) ═══════════ -->
  <rect x="300" y="390" width="300" height="110" rx="10" fill="rgba(255,0,170,0.06)" stroke="#ff00aa" stroke-width="1.5" filter="url(#glow-magenta)"/>
  <text x="450" y="414" text-anchor="middle" fill="#ff00aa" font-size="13" font-weight="bold">🎯  ADVERSARY — 17 Payloads</text>

  <rect x="315" y="428" width="130" height="30" rx="6" fill="rgba(255,0,170,0.1)" stroke="#ff00aa" stroke-width="0.8"/>
  <text x="380" y="448" text-anchor="middle" fill="#e6edf3" font-size="10">Payload Generators</text>

  <rect x="455" y="428" width="130" height="30" rx="6" fill="rgba(255,0,170,0.1)" stroke="#ff00aa" stroke-width="0.8"/>
  <text x="520" y="448" text-anchor="middle" fill="#e6edf3" font-size="10">Corpus Builder</text>

  <rect x="385" y="466" width="130" height="30" rx="6" fill="rgba(255,0,170,0.1)" stroke="#ff00aa" stroke-width="0.8"/>
  <text x="450" y="486" text-anchor="middle" fill="#e6edf3" font-size="10">TPR / FPR Metrics</text>

  <!-- ═══════════ ARROWS: Offense → Defense ═══════════ -->
  <!-- Ring 0 → Memory Analysis -->
  <path d="M270,107 C380,107 500,149 630,149" fill="none" stroke="#00d4ff" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-cyan)" opacity="0.7"/>
  <!-- Ring -1 → Behavioral -->
  <path d="M270,149 C420,149 500,275 630,275" fill="none" stroke="#00d4ff" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-cyan)" opacity="0.7"/>
  <!-- Ring -2 → Ring -3 Subsystem -->
  <path d="M270,191 C420,191 500,317 630,317" fill="none" stroke="#00d4ff" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-cyan)" opacity="0.7"/>
  <!-- Ring -3 → Ring -3 Subsystem -->
  <path d="M270,233 C400,233 520,317 630,317" fill="none" stroke="#00d4ff" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-cyan)" opacity="0.7"/>
  <!-- AArch64 → Firmware Structure -->
  <path d="M270,275 C420,275 500,191 630,191" fill="none" stroke="#00d4ff" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-cyan)" opacity="0.7"/>
  <!-- RISC-V → Firmware Structure -->
  <path d="M270,317 C400,317 520,191 630,191" fill="none" stroke="#00d4ff" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-cyan)" opacity="0.7"/>

  <!-- ═══════════ ARROWS: Adversary → Defense ═══════════ -->
  <path d="M450,390 L740,360" fill="none" stroke="#ff00aa" stroke-width="1.5" marker-end="url(#arrow-magenta)" opacity="0.8"/>
  <text x="600" y="368" text-anchor="middle" fill="#8b949e" font-size="9" transform="rotate(-5,600,368)">tampered images</text>

  <!-- ═══════════ ARROW: Defense → Metrics ═══════════ -->
  <path d="M740,360 L740,420 C740,460 600,480 520,480" fill="none" stroke="#00ff88" stroke-width="1.5" marker-end="url(#arrow-green)" opacity="0.8"/>
  <text x="760" y="420" fill="#8b949e" font-size="9">scan results</text>

  <!-- Center flow label -->
  <text x="450" y="210" text-anchor="middle" fill="#8b949e" font-size="10" font-style="italic">closed-loop validation</text>
</svg>
